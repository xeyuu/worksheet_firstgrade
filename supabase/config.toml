# supabase/config.toml
# Supabase local dev + GitHub Integration config
# docs: https://supabase.com/docs/guides/cli/config

project_id = "your-project-ref"   # แก้เป็น Project Reference ID จาก Supabase dashboard

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
jwt_expiry = 3600
enable_signup = true
